[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/hire-overseas-workers-ireland/"
  to = "/work-permit-guide/"
  status = 301

[[redirects]]
  from = "/services/"
  to = "/#services"
  status = 301

# Temporary redirects until inner pages are built (Session 2)
[[redirects]]
  from = "/faq/"
  to = "/#faq"
  status = 302

[[redirects]]
  from = "/about/"
  to = "/#"
  status = 302

[[redirects]]
  from = "/work-permit-guide/"
  to = "/"
  status = 302

[[redirects]]
  from = "/blog/"
  to = "/"
  status = 302

[[redirects]]
  from = "/contact/"
  to = "/#callback"
  status = 302
